services:
  - type: web
    name: hellodude-backend
    env: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    plan: free
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: CLIENT_URL
        sync: false
      - key: MONGO_URL
        sync: false
      - key: JWT_S_KEY
        sync: false
      - key: STREAM_API_KEY
        sync: false
      - key: STREAM_API__SEC_KEY
        sync: false

  - type: web
    name: hellodude-frontend
    env: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    pullRequestPreviewsEnabled: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_BASE_URL
        sync: false
      - key: VITE_STREAM_API_KEY
        sync: false
